name: CI/CD - Sabor y Gestión

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest
    
    # Definimos las variables de entorno a nivel de Job para que todos los pasos las vean
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter backend exec prisma generate 

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  deploy:
    name: Deploy to Production
    needs: validate # Solo se ejecuta si "validate" termina sin errores
    runs-on: ubuntu-latest
    
    # Solo hacer deploy si el evento es un push directo a la rama 'main'
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      # Simulación de despliegue
      - name: Execute Deployment
        run: |
          echo "Simulando el despliegue a producción..."
          sleep 5
          echo "¡Despliegue simulado exitoso!"
          
          # NOTA: Una vez que compruebes que este paso solo se ejecuta en main,
          # borra los comandos de arriba (echo y sleep) y reemplázalos por tus comandos reales.
          # Ejemplo: pnpm deploy o los comandos de tu servidor.