name: CI - Sabor y Gestión

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/dummy_db"

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0 # Según tu package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter backend exec prisma generate # Paso obligatorio según tu README

      - name: Lint
        run: pnpm lint # Ejecuta turbo run lint

      - name: Typecheck
        run: pnpm typecheck # Ejecuta turbo run typecheck

      - name: Build
        run: pnpm build # Valida que el proyecto compile correctamente